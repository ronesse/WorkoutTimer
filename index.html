<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  >

  <meta name="theme-color" content="#15803d">

  <meta
    name="description"
    content="Mobil treningsklokke for kettlebell og intervalltrening"
  >

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">

  <title>WorkoutTimer Pro</title>
</head>

<body class="ready">

  <main class="app">

    <header class="topbar">

      <div>
        <div class="eyebrow">
          KETTLEBELL 60/30
        </div>

        <h1>WorkoutTimer Pro</h1>
      </div>

      <button
        id="settingsBtn"
        class="icon-btn"
        aria-label="Innstillinger"
      >
        ⚙️
      </button>

    </header>


    <section
      class="timer-card"
      aria-live="polite"
    >

      <div class="meta-row">

        <span id="roundText">
          Runde 1 av 20
        </span>

        <span id="totalText">
          30:00 igjen
        </span>

      </div>


      <div
        id="phaseText"
        class="phase"
      >
        KLAR
      </div>


      <div
        id="messageText"
        class="message"
      >
        Trykk start når du er klar
      </div>


      <div
        id="timeText"
        class="time"
      >
        60
      </div>


      <div
        id="nextText"
        class="next"
      >
        Neste: Hvile 30 sek
      </div>


      <div class="progress-track">

        <div
          id="progressBar"
          class="progress-bar"
        ></div>

      </div>

    </section>


    <a
      id="spotifyBtn"
      class="spotify-btn"
      href="LIM_INN_SPOTIFY_LENKEN_HER"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span class="spotify-icon">♫</span>

      <span>
        Åpne Spotify-spilleliste
      </span>
    </a>


    <section class="controls">

      <button
        id="startPauseBtn"
        class="primary-btn"
      >
        ▶ Start
      </button>

      <button
        id="resetBtn"
        class="secondary-btn"
      >
        ↺ Nullstill
      </button>

    </section>


    <section
      id="settingsPanel"
      class="settings hidden"
    >

      <h2>Innstillinger</h2>


      <label class="toggle">

        <span>Pip</span>

        <input
          id="beepToggle"
          type="checkbox"
          checked
        >

      </label>


      <label class="toggle">

        <span>Norsk stemme</span>

        <input
          id="voiceToggle"
          type="checkbox"
          checked
        >

      </label>


      <label class="toggle">

        <span>Vibrasjon</span>

        <input
          id="vibrateToggle"
          type="checkbox"
          checked
        >

      </label>


      <div class="music">

        <h3>Musikkfiler fra telefonen</h3>

        <p>
          Dette er valgfritt. Du kan enten bruke Spotify-knappen
          eller velge lokale lydfiler fra telefonen.
        </p>

        <input
          id="musicFiles"
          type="file"
          accept="audio/*"
          multiple
        >


        <div class="music-buttons">

          <button
            id="musicPlayBtn"
            class="small-btn"
            disabled
          >
            ▶ Musikk
          </
